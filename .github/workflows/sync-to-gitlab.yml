name: Sync to GitLab

on:
  push:
    branches:
      - main

jobs:
  push-to-gitlab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Debug secrets presence
        run: |
          echo "GITLAB_USERNAME set: ${{ secrets.GITLAB_USERNAME != '' }}"
          echo "GITLAB_TOKEN set: ${{ secrets.GITLAB_TOKEN != '' }}"
          echo "GITLAB_REPO value: ${{ secrets.GITLAB_REPO }}"

      - name: Push to GitLab
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git remote add gitlab https://${{ secrets.GITLAB_USERNAME }}:${{ secrets.GITLAB_TOKEN }}@gitlab.com/${{ secrets.GITLAB_REPO }}.git
          git remote -v
          git log --oneline -3
          GIT_TRACE=1 GIT_CURL_VERBOSE=1 git push gitlab main --force 2>&1

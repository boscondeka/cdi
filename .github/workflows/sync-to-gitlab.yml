name: Sync to GitLab

on:
  push:
    branches:
      - main

jobs:
  push-to-gitlab:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Push to GitLab
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git remote add gitlab https://${{ secrets.GITLAB_USERNAME }}:${{ secrets.GITLAB_TOKEN }}@gitlab.com/${{ secrets.GITLAB_REPO }}.git
          echo "Pushing to: https://gitlab.com/${{ secrets.GITLAB_REPO }}"
          git push gitlab main --force
          echo "Push command exited with code $?"

      - name: Verify push reached GitLab
        run: |
          REPO_PATH=$(echo "${{ secrets.GITLAB_REPO }}" | sed 's/\//%2F/g')

          # Get latest commit on GitLab main
          GITLAB_SHA=$(curl -sf --header "PRIVATE-TOKEN: ${{ secrets.GITLAB_TOKEN }}" \
            "https://gitlab.com/api/v4/projects/${REPO_PATH}/repository/branches/main" \
            | python3 -c "import sys,json; print(json.load(sys.stdin)['commit']['id'])")

          GITHUB_SHA="${{ github.sha }}"

          echo "GitHub commit : $GITHUB_SHA"
          echo "GitLab commit : $GITLAB_SHA"

          if [ "$GITLAB_SHA" = "$GITHUB_SHA" ]; then
            echo "SUCCESS: GitLab is in sync with GitHub"
          else
            echo "MISMATCH: GitLab does not reflect the latest GitHub commit"
            exit 1
          fi
